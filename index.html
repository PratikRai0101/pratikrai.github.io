<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pratik Rai - Wikipedia Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="page-base">
  <div id="utility-header">
    <div id="sidebar-logo">
      <!-- Wikipedia globe placeholder -->
      <div class="wiki-globe"></div>
      <div class="wiki-text">Wikipedia: The Free Encyclopedia</div>
    </div>
    <div style="margin-left:18px;">Pratik Rai Portfolio Wiki</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:21px;">
      <input id="utility-search" type="text" placeholder="Search..." style="padding:6px 19px;font-size:1em;border-radius:3px;border:1px solid #a2a9b1;" />
      <a href="https://github.com/PratikRai0101/pratikrai.github.io" class="wiki-blue" style="font-size:0.97em;">GitHub</a>
    </div>
  </div>
  <div id="tabs-row">
    <div class="tablist">
      <span class="tab active">Article</span>
      <span class="tab">Talk</span>
    </div>
    <div class="tab-controls">
      <span class="tab active">Read</span>
      <span class="tab"><a href="https://github.com/PratikRai0101/pratikrai.github.io" class="wiki-blue" style="text-decoration:none;">View source</a></span>
      <span class="tab">View history</span>
    </div>
  </div>
  <div id="main-area">
    <nav id="sidebar">
      <div class="sidebar-section" id="sidebar-toc">
        <h3>Contents</h3>
        <div id="toc"></div>
      </div>
      <div class="sidebar-section">
        <h3>Languages</h3>
        <ul style="font-size:.99em;">
          <li>EN (en)</li>
        </ul>
      </div>
    </nav>
    <main id="content">
      <h1 id="main-title">Pratik Rai</h1>
      <div id="tagline">From Wikipedia, the free encyclopedia</div>
      <div id="infobox"></div>
      <div id="main-content"></div>
      <section id="references"><h2>References</h2><ol id="ref-list"></ol></section>
    </main>
  </div>
</div>
<script>
// --- Sidebar TOC Injection ---
const sections = [
  { id: 'identity', title: 'Identity' },
  { id: 'education', title: 'Education' },
  { id: 'roles', title: 'Roles' },
  { id: 'experience', title: 'Experience' },
  { id: 'projects', title: 'Projects' },
  { id: 'skills', title: 'Skills' },
  { id: 'achievements', title: 'Achievements' }
];
function renderTOC() {
  const toc = document.getElementById('toc');
  toc.innerHTML = '<ul style="padding-inline-start: 20px;margin:0;">' +
    sections.map(sec => `<li><a href="#${sec.id}">${sec.title}</a></li>`).join('') + '</ul>';
  Array.from(document.querySelectorAll('#toc a')).forEach(a => {
    a.addEventListener('click', function(e) {
      const hash = a.getAttribute('href');
      if (hash && hash.startsWith('#')) {
        e.preventDefault();
        document.querySelector(hash).scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
}
renderTOC();
// --- Utility search bar: scroll to text ---
document.getElementById('utility-search').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') window.find(this.value, false, false, true, false, false, false);
});
// --- Infobox, Data, Sections ---
const wikiLinks = {
  Rust: 'https://www.rust-lang.org/',
  Solidity: 'https://soliditylang.org/',
  'C/C++': 'https://cplusplus.com/',
  Python: 'https://python.org/',
  'Arch Linux (Hyprland)': 'https://wiki.archlinux.org/',
  'React Native': 'https://reactnative.dev/'
};
const references = [
  {
    anchorText: 'Enduride',
    cite: 'Rai, P. "Enduride: Low-Cost IoT Telematics (Rs. 1,139, <5s crash alert)." Enduraverse Hackathon (2025).',
    url: 'https://github.com/PratikRai0101/enduride'
  },
  {
    anchorText: 'Evo2 Variant Analysis',
    cite: 'Rai, P. "Evo2 Variant Analysis: Genomic AI platform, 9.3T nucleotides, 1,000+ analyses, 100+ NFT mints." Google Evo2 (2025).',
    url: 'https://github.com/PratikRai0101/evo2-variant-analysis'
  },
  {
    anchorText: 'DIMO',
    cite: 'Rai, P. "DIMO: Gas-optimized Solidity (zkSync) for 1,000+ users; 65% fee reduction." DIMO Internship (2025).',
    url: 'https://www.linkedin.com/in/pratikrai0101/'
  }
];
function renderWikiLink(text) {
  if (wikiLinks[text])
    return `<a href="${wikiLinks[text]}" class="wiki-blue" tabindex="-1" target="_blank">${text}</a>`;
  return text;
}
fetch('data.json').then(r => r.json()).then(data => {
  // Infobox render with image row
  const profileImage = data.profile_image || 'https://via.placeholder.com/300x400?text=Profile+Picture';
  document.getElementById('infobox').innerHTML = `
    <div id="infobox-header">Pratik Rai</div>
    <div class="infobox-image"><img src="${profileImage}" alt="Pratik Rai"></div>
    <div style="font-weight:bold;padding:6px 12px 2px 12px">21-year-old Engineer, Researcher</div>
    <div class="infobox-row"><div class="infobox-label">Education</div><div class="infobox-value">B.Tech (IoT, YCCE Nagpur)<br><span style='color:#444;font-size:0.93em;'>Exp. June 2027</span></div></div>
    <div class="infobox-row"><div class="infobox-label">Leadership</div><div class="infobox-value"><ul style='margin:5px 0 5px 18px;padding-left:0;'>
      <li>Chairperson @ Codeware Coding Club (2025–)</li>
      <li>Vice Chairperson @ IEEE CS (2025–), 300+ members, 750+ events</li>
      </ul></div></div>
    <div class="infobox-row"><div class="infobox-label">Links</div><div class="infobox-value"><ul style="margin:3px 0 3px 0;padding-left:0;">
      <li><a href="https://pratikrai.dev" target="_blank">Website</a></li>
      <li><a href="https://github.com/PratikRai0101" target="_blank">GitHub</a></li>
      <li><a href="https://linkedin.com/in/pratikrai0101" target="_blank">LinkedIn</a></li>
      </ul></div></div>
  `;
  // Main content sections
  let html = '';
  const citationMap = {
    'Enduride': 1, 'Evo2 Variant Analysis': 2, 'DIMO': 3
  };
  sections.forEach(sec => {
    html += `<h2 id="${sec.id}">${sec.title}</h2><hr class="section-divider">`;
    if (Array.isArray(data[sec.id])) {
      html += '<ul>' + data[sec.id].map(x => {
        let found = '';
        Object.entries(citationMap).forEach(([k, idx]) => {
          if (x.includes(k))
            found = `<sup><a href=\"#ref${idx}\" class=\"wiki-blue\" style=\"text-decoration:none;font-size:0.92em;\">[${idx}]</a></sup>`;
        });
        if(sec.id === 'skills' && wikiLinks[x]) return `<li>${renderWikiLink(x)}</li>`;
        return `<li>${x}${found}</li>`;
      }).join('') + '</ul>';
    } else if (typeof data[sec.id]==='object') {
      html += '<ul>' + Object.values(data[sec.id]).map(x => `<li>${x}</li>`).join('') + '</ul>';
    } else {
      let txt = data[sec.id];
      Object.entries(citationMap).forEach(([k, idx]) => {
        if (typeof txt==='string' && txt.includes(k))
          txt = txt.replace(k, `${k}<sup><a href=\"#ref${idx}\" class=\"wiki-blue\" style=\"text-decoration:none;font-size:0.92em;\">[${idx}]</a></sup>`);
      });
      html += `<p>${txt}</p>`;
    }
  });
  document.getElementById('main-content').innerHTML = html;
  // References
  document.getElementById('ref-list').innerHTML = references.map((ref, i) => `<li id="ref${i+1}"><cite>${ref.cite}</cite> <a href="${ref.url}" class="wiki-blue" target="_blank">[Link]</a></li>`).join('');
});
</script>
</body>
</html>
