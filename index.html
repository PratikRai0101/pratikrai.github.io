<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pratik Rai - Wikipedia Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="vector-header">
  <div class="vector-logo">
    <!-- Placeholder for globe logo -->
    <svg viewBox="0 0 32 32" style="border-radius:50%;background:#e5e5e5" width="34" height="34"><circle cx="16" cy="16" r="14" fill="#eee" stroke="#8a8a8a" stroke-width="2"/></svg>
  </div>
  <div class="vector-searchbar">
    <input type="text" id="searchInput" placeholder="Search Pratik's Wiki..." />
  </div>
</div>
<div id="wiki-wrap">
  <div id="wiki-main">
    <nav id="sidebar">
      <div class="sidebar-section" id="sidebar-contents">
        <h3>Contents</h3>
        <div id="toc"></div>
      </div>
      <div class="sidebar-section" id="sidebar-tools">
        <h3>Tools</h3>
        <ul>
          <li><a href="https://github.com/PratikRai0101" target="_blank" tabindex="-1">GitHub</a></li>
          <li><a href="https://pratikrai.dev" target="_blank" tabindex="-1">Website</a></li>
        </ul>
      </div>
      <div class="sidebar-section" id="sidebar-langs">
        <h3>Languages</h3>
        <ul style="font-size:.96em;">
          <li>EN (en)</li>
        </ul>
      </div>
    </nav>
    <main id="main-content-area">
      <div class="page-tabs">
        <div class="tablist">
          <span class="tab selected">Article</span>
          <span class="tab">Talk</span>
        </div>
        <div class="tab-controls">
          <span class="tab">Read</span>
          <span class="tab">View source</span>
          <span class="tab">View history</span>
        </div>
      </div>
      <h1 id="main-title">Pratik Rai</h1>
      <div id="infobox"><!-- Filled by JS --></div>
      <div id="main-content"><!-- Rendered Sections --></div>
      <section id="references"><h2>References</h2><ol id="ref-list"></ol></section>
    </main>
  </div>
</div>
<script>
// --- SEARCH -- 
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    window.find(this.value, false, false, true, false, false, false);
  }
});
// --- DATA AND RENDER ---
const wikiLinks = {
  Rust: 'https://www.rust-lang.org/',
  Solidity: 'https://soliditylang.org/',
  'C/C++': 'https://cplusplus.com/',
  Python: 'https://python.org/',
  'Arch Linux (Hyprland)': 'https://wiki.archlinux.org/',
  'React Native': 'https://reactnative.dev/'
};
// Reference mapping [claim] : [citation]
const references = [
  {
    anchorText: 'Enduride',
    cite: 'Rai, P. "Enduride: Low-Cost IoT Telematics." Enduraverse Hackathon (2025).',
    url: 'https://github.com/PratikRai0101/enduride'
  },
  {
    anchorText: 'Evo2 Variant Analysis',
    cite: 'Rai, P. "Evo2 Variant Analysis: Genomic AI platform trained on 9.3T nucleotides." Google Evo2 Competition (2025).',
    url: 'https://github.com/PratikRai0101/evo2-variant-analysis'
  },
  {
    anchorText: 'DIMO',
    cite: 'Rai, P. "DIMO: Gas-optimized Solidity (zkSync) for 1,000+ users." DIMO Internship (2025).',
    url: 'https://www.linkedin.com/in/pratikrai0101/'
  },
  {
    anchorText: 'HackGenX',
    cite: 'Rai, P. "HackGenX AI Budgeting App with $0.92 R² Accuracy." HackGenX Finals (2025).',
    url: 'https://github.com/PratikRai0101/hackgenx'
  },
  {
    anchorText: 'SIH 2025',
    cite: 'Smart India Hackathon 2025 Finalist Announced – Official Listing.',
    url: 'https://sih.gov.in/sih2025/shortlist-finalist-list'
  },
  {
    anchorText: 'BNB Hack Kerala',
    cite: 'Binance BNB Hack Kerala, Winners List (2025).',
    url: 'https://bnbchain.org/en/hackathons/kerala-2025/results'
  }
];
function renderWikiLink(text) {
  if (wikiLinks[text])
    return `<a href="${wikiLinks[text]}" class="wiki-blue" tabindex="-1" target="_blank">${text}</a>`;
  return text;
}
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    // Render infobox with proper header
    const infobox = document.getElementById('infobox');
    infobox.innerHTML = `
      <div id="infobox-header">Pratik Rai</div>
      <div style="margin-bottom:5px;">21-year-old Engineer & Researcher</div>
      <hr class="section-divider">
      <b>B.Tech (IoT), YCCE Nagpur</b><br>
      <span>Exp. June 2027</span><hr class="section-divider">
      <b>Leadership</b> <ul style="margin:3px 0 5px 17px;padding-left:9px;">
        <li>Chairperson @ Codeware Coding Club (2025-)</li>
        <li>Vice Chairperson @ IEEE CS (2025-) <span style="color:#222;font-weight:400;">(300+ members, 750+ events)</span></li>
      </ul>
      <b>Links</b> <ul style="margin:3px 0 3px 17px;padding-left:9px;">
        <li><a href="https://pratikrai.dev" target="_blank">Website</a></li>
        <li><a href="https://github.com/PratikRai0101" target="_blank">GitHub</a></li>
        <li><a href="https://linkedin.com/in/pratikrai0101" target="_blank">LinkedIn</a></li>
      </ul>
    `;
    // Table of Contents
    const sections = [
      { id: 'identity', title: 'Identity' },
      { id: 'education', title: 'Education' },
      { id: 'roles', title: 'Roles' },
      { id: 'experience', title: 'Experience' },
      { id: 'projects', title: 'Projects' },
      { id: 'skills', title: 'Skills' },
      { id: 'achievements', title: 'Achievements' }
    ];
    const toc = document.getElementById('toc');
    toc.innerHTML = '<ul style="list-style-type:decimal;padding-left:18px;">' +
      sections.map(sec => `<li><a href="#${sec.id}">${sec.title}</a></li>`).join('') +
      '</ul>';
    // Main content
    const content = document.getElementById('main-content');
    let html = '';
    // Inline citation logic
    const citationMap = {
      'Enduride': 1,
      'Evo2 Variant Analysis': 2,
      'DIMO': 3,
      'HackGenX': 4,
      'SIH': 5,
      'BNB Hack': 6
    };
    sections.forEach(sec => {
      html += `<h2 id="${sec.id}">${sec.title}</h2><hr class="section-divider">`;
      // Render depending on data type
      if (Array.isArray(data[sec.id])) {
        html += '<ul>' + data[sec.id].map((x) => {
          // Inline citation injection
          let found = '';
          Object.entries(citationMap).forEach(([k, idx]) => {
            if (x.includes(k))
              found = `<sup><a href=\"#ref${idx}\" class=\"wiki-blue\" style=\"text-decoration:none;font-size:0.92em;\">[${idx}]</a></sup>`;
          });
          // Wiki-ify skills if section is skills
          if(sec.id === 'skills' && wikiLinks[x]) return `<li>${renderWikiLink(x)}</li>`;
          return `<li>${x}${found}</li>`;
        }).join('') + '</ul>';
      } else if (typeof data[sec.id] === 'object') {
        html += '<ul>' + Object.values(data[sec.id]).map(x => `<li>${x}</li>`).join('') + '</ul>';
      } else {
        let txt = data[sec.id];
        Object.entries(citationMap).forEach(([k, idx]) => {
          if (typeof txt === 'string' && txt.includes(k))
            txt = txt.replace(k, `${k}<sup><a href=\"#ref${idx}\" class=\"wiki-blue\" style=\"text-decoration:none;font-size:0.92em;\">[${idx}]</a></sup>`);
        });
        html += `<p>${txt}</p>`;
      }
    });
    content.innerHTML = html;
    // References
    const refList = document.getElementById('ref-list');
    refList.innerHTML = references.map((ref, i) => `<li id="ref${i+1}"><cite>${ref.cite}</cite> <a href="${ref.url}" class="wiki-blue" target="_blank">[Link]</a></li>`).join('');
  });
</script>
</body>
</html>
