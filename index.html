<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pratik Rai - Wikipedia Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="vector-header">
  <div class="vector-logo">
    <!-- PR globe SVG -->
    <svg viewBox="0 0 32 32" width="34" height="34"><circle cx="16" cy="16" r="15" fill="#f7f7f7" stroke="#8a8a8a" stroke-width="2"/><text x="8" y="21" font-size="13" font-weight="bold" font-family="Georgia,serif" fill="#38499c">PR</text></svg>
  </div>
  <div class="vector-searchbar">
    <input type="text" id="searchInput" placeholder="Search Pratik's Wiki..." />
  </div>
</div>
<div id="wiki-wrap">
  <div id="wiki-main">
    <nav id="sidebar">
      <div class="sidebar-section" id="sidebar-contents">
        <h3>Contents <button id="toc-toggle" style="float:right;font-size:.9em;margin-right:5px;">hide</button></h3>
        <div id="toc"></div>
      </div>
      <div class="sidebar-section" id="sidebar-tools">
        <h3>Tools</h3>
        <ul>
          <li><a href="https://github.com/PratikRai0101" target="_blank" tabindex="-1">GitHub</a></li>
          <li><a href="https://pratikrai.dev" target="_blank" tabindex="-1">Website</a></li>
        </ul>
      </div>
      <div class="sidebar-section" id="sidebar-langs">
        <h3>Languages</h3>
        <ul style="font-size:.96em;">
          <li>EN (en)</li>
        </ul>
      </div>
    </nav>
    <main id="main-content-area">
      <div class="page-tabs">
        <div class="tablist">
          <span class="tab selected">Article</span>
          <span class="tab">Talk</span>
        </div>
        <div class="tab-controls">
          <span class="tab selected">Read</span>
          <span class="tab"><a href="https://github.com/PratikRai0101/pratikrai.github.io" class="wiki-blue" style="text-decoration:none;">View source</a></span>
          <span class="tab">View history</span>
        </div>
      </div>
      <h1 id="main-title">Pratik Rai</h1>
      <div id="tagline">From Wikipedia, the free encyclopedia</div>
      <div id="infobox"><!-- Filled by JS --></div>
      <div id="main-content"><!-- Rendered Sections --></div>
      <section id="references"><h2>References</h2><ol id="ref-list"></ol></section>
    </main>
  </div>
</div>
<script>
// --- SEARCH -- 
function wikiFind(q) {
  if (!q || !q.trim()) return;
  window.find(q.trim(), false, false, true, false, false, false);
}
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') wikiFind(this.value);
});
// TOC toggle
const tocToggleBtn = document.getElementById('toc-toggle');
tocToggleBtn.addEventListener('click', function() {
  const tocDiv = document.getElementById('toc');
  if (tocDiv.style.display === 'none') {
    tocDiv.style.display = '';
    this.textContent = 'hide';
  } else {
    tocDiv.style.display = 'none';
    this.textContent = 'show';
  }
});
// TOC smooth scroll
function enableTocSmoothScroll() {
  Array.from(document.querySelectorAll('#toc a')).forEach(a => {
    a.addEventListener('click', function(e) {
      const hash = a.getAttribute('href');
      if (hash && hash.startsWith('#')) {
        e.preventDefault();
        document.querySelector(hash).scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
}
// --- DATA AND RENDER ---
const wikiLinks = {
  Rust: 'https://www.rust-lang.org/',
  Solidity: 'https://soliditylang.org/',
  'C/C++': 'https://cplusplus.com/',
  Python: 'https://python.org/',
  'Arch Linux (Hyprland)': 'https://wiki.archlinux.org/',
  'React Native': 'https://reactnative.dev/'
};
// Reference mapping [claim] : [citation]
const references = [
  {
    anchorText: 'Enduride',
    cite: 'Rai, P. "Enduride: Low-Cost IoT Telematics (Rs. 1,139, <5s crash alert)." Enduraverse Hackathon (2025).',
    url: 'https://github.com/PratikRai0101/enduride'
  },
  {
    anchorText: 'Evo2 Variant Analysis',
    cite: 'Rai, P. "Evo2 Variant Analysis: Genomic AI platform trained on 9.3T nucleotides, 1,000+ analyses, 100+ NFT mints." Google Evo2 Competition (2025).',
    url: 'https://github.com/PratikRai0101/evo2-variant-analysis'
  },
  {
    anchorText: 'DIMO',
    cite: 'Rai, P. "DIMO: Gas-optimized Solidity (zkSync) for 1,000+ users; 65% fee reduction." DIMO Internship (2025).',
    url: 'https://www.linkedin.com/in/pratikrai0101/'
  }
];
function renderWikiLink(text) {
  if (wikiLinks[text])
    return `<a href="${wikiLinks[text]}" class="wiki-blue" tabindex="-1" target="_blank">${text}</a>`;
  return text;
}
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    // Render Infobox with precision rows
    const infobox = document.getElementById('infobox');
    infobox.innerHTML = `
      <div id="infobox-header">Pratik Rai</div>
      <div style="font-weight:bold;">21-year-old Engineer, Researcher</div>
      <div class="infobox-row"><div class="infobox-label">Education</div><div class="infobox-value">B.Tech (IoT, YCCE Nagpur)<br><span style='color:#444;font-size:0.94em;'>Exp. June 2027</span></div></div>
      <div class="infobox-row"><div class="infobox-label">Leadership</div><div class="infobox-value"><ul style='margin:5px 0 5px 16px;padding-left:0;'>
      <li>Chairperson @ Codeware Coding Club (2025–)</li>
      <li>Vice Chairperson @ IEEE CS (2025–), 300+ members, 750+ events</li>
      </ul></div></div>
      <div class="infobox-row"><div class="infobox-label">Links</div><div class="infobox-value"><ul style="margin:3px 0 3px 0;padding-left:0;">
        <li><a href="https://pratikrai.dev" target="_blank">Website</a></li>
        <li><a href="https://github.com/PratikRai0101" target="_blank">GitHub</a></li>
        <li><a href="https://linkedin.com/in/pratikrai0101" target="_blank">LinkedIn</a></li>
      </ul></div></div>
    `;
    // Table of Contents
    const sections = [
      { id: 'identity', title: 'Identity' },
      { id: 'education', title: 'Education' },
      { id: 'roles', title: 'Roles' },
      { id: 'experience', title: 'Experience' },
      { id: 'projects', title: 'Projects' },
      { id: 'skills', title: 'Skills' },
      { id: 'achievements', title: 'Achievements' }
    ];
    const toc = document.getElementById('toc');
    toc.innerHTML = '<ul style="list-style-type:decimal;padding-left:18px;">' +
      sections.map(sec => `<li><a href="#${sec.id}">${sec.title}</a></li>`).join('') +
      '</ul>';
    enableTocSmoothScroll();
    // Main content
    const content = document.getElementById('main-content');
    let html = '';
    const citationMap = { 'Enduride': 1, 'Evo2 Variant Analysis': 2, 'DIMO': 3 };
    sections.forEach(sec => {
      html += `<h2 id="${sec.id}">${sec.title}</h2><hr class="section-divider">`;
      if (Array.isArray(data[sec.id])) {
        html += '<ul>' + data[sec.id].map((x) => {
          let found = '';
          Object.entries(citationMap).forEach(([k, idx]) => {
            if (x.includes(k))
              found = `<sup><a href=\"#ref${idx}\" class=\"wiki-blue\" style=\"text-decoration:none;font-size:0.92em;\">[${idx}]</a></sup>`;
          });
          if(sec.id === 'skills' && wikiLinks[x]) return `<li>${renderWikiLink(x)}</li>`;
          return `<li>${x}${found}</li>`;
        }).join('') + '</ul>';
      } else if (typeof data[sec.id] === 'object') {
        html += '<ul>' + Object.values(data[sec.id]).map(x => `<li>${x}</li>`).join('') + '</ul>';
      } else {
        let txt = data[sec.id];
        Object.entries(citationMap).forEach(([k, idx]) => {
          if (typeof txt === 'string' && txt.includes(k))
            txt = txt.replace(k, `${k}<sup><a href=\"#ref${idx}\" class=\"wiki-blue\" style=\"text-decoration:none;font-size:0.92em;\">[${idx}]</a></sup>`);
        });
        html += `<p>${txt}</p>`;
      }
    });
    content.innerHTML = html;
    // References
    const refList = document.getElementById('ref-list');
    refList.innerHTML = references.map((ref, i) => `<li id="ref${i+1}"><cite>${ref.cite}</cite> <a href="${ref.url}" class="wiki-blue" target="_blank">[Link]</a></li>`).join('');
  });
</script>
</body>
</html>
